name: scheduled-refresh

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 03:05, 09:05, 15:05, 21:05 UTC = 12:05, 18:05, 00:05, 06:05 KST.
    - cron: "5 3,9,15,21 * * *"
  workflow_dispatch:

concurrency:
  group: scheduled-refresh
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      refresh_mode: ${{ steps.toggle.outputs.refresh_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Check scheduler toggle
        id: toggle
        env:
          ENABLE_SCHEDULED_REFRESH: ${{ secrets.ENABLE_SCHEDULED_REFRESH }}
        run: |
          if [ "${ENABLE_SCHEDULED_REFRESH}" = "true" ]; then
            echo "refresh_mode=run" >> "$GITHUB_OUTPUT"
          else
            echo "refresh_mode=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh skipped
        if: steps.toggle.outputs.refresh_mode != 'run'
        run: echo "ENABLE_SCHEDULED_REFRESH is not true; skipping live refresh run."

  refresh:
    needs: preflight
    if: needs.preflight.outputs.refresh_mode == 'run'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: 4blog
            timeout_minutes: 20
          - source: dinnerqueen
            timeout_minutes: 25
          - source: reviewnote
            timeout_minutes: 15
          - source: revu
            timeout_minutes: 15
          - source: seouloppa
            timeout_minutes: 45
          - source: gangnammatzip
            timeout_minutes: 25
    name: refresh-${{ matrix.source }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh source
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VWORLD_API_KEY: ${{ secrets.VWORLD_API_KEY }}
          REVU_ACCESS_TOKEN: ${{ secrets.REVU_ACCESS_TOKEN }}
          REVU_USERNAME: ${{ secrets.REVU_USERNAME }}
          REVU_PASSWORD: ${{ secrets.REVU_PASSWORD }}
          CRAWLER_DRY_RUN: "false"
        run: |
          python -m crawler.cli run-source ${{ matrix.source }} \
            --write \
            --delete-before-refresh
