name: scheduled-refresh

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 03:05, 09:05, 15:05, 21:05 UTC = 12:05, 18:05, 00:05, 06:05 KST.
    - cron: "5 3,9,15,21 * * *"
  workflow_dispatch:

concurrency:
  group: scheduled-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Check scheduler toggle
        id: toggle
        env:
          ENABLE_SCHEDULED_REFRESH: ${{ secrets.ENABLE_SCHEDULED_REFRESH }}
        run: echo "enabled=${ENABLE_SCHEDULED_REFRESH}" >> "$GITHUB_OUTPUT"

      - name: Scheduled refresh
        if: steps.toggle.outputs.enabled == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REVU_ACCESS_TOKEN: ${{ secrets.REVU_ACCESS_TOKEN }}
          REVU_USERNAME: ${{ secrets.REVU_USERNAME }}
          REVU_PASSWORD: ${{ secrets.REVU_PASSWORD }}
          CRAWLER_DRY_RUN: "false"
        run: |
          python -m crawler.cli run-scheduled \
            --source 4blog \
            --source dinnerqueen \
            --source reviewnote \
            --source revu \
            --source seouloppa \
            --source gangnammatzip \
            --write \
            --delete-before-refresh

      - name: Refresh skipped
        if: steps.toggle.outputs.enabled != 'true'
        run: echo "ENABLE_SCHEDULED_REFRESH is not true; skipping live refresh run."
