name: flutter-ci

on:
  push:
    branches:
      - main
    paths:
      - 'apps/flutter/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'apps/flutter/**'
      - '.github/workflows/flutter-ci.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Build Android debug APK
        run: flutter build apk --debug

  ios-verify:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without codesigning
        run: flutter build ios --debug --no-codesign
